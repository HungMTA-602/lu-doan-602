
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lữ đoàn Thông tin 602</title>
  <style>
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{
      margin:0;
      background:linear-gradient(135deg,#0b2d1d,#0e4a2f,#163f7a);
      color:white;
      text-align:center;
    }
    .wrap{
      max-width:900px;
      margin:auto;
      padding:30px;
    }
    .card{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:20px;
      padding:25px;
      margin:20px 0;
      backdrop-filter:blur(8px);
    }
    h1{
      margin:10px 0;
      color:#ffd700;
      font-size:40px;
    }
    .slogan{
      font-size:22px;
      color:#fff3b0;
      margin-bottom:20px;
    }
    .qr{
      width:220px;
      border-radius:12px;
      margin-top:15px;
      background:white;
      padding:10px;
    }
    .btn{
      display:inline-block;
      margin-top:15px;
      padding:12px 22px;
      background:#ffd700;
      color:black;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>LỮ ĐOÀN THÔNG TIN 602</h1>
      <div class="slogan">
        “Kịp thời – Chính xác – Bí mật – An toàn”
      </div>
    </div>

    <div class="card">
      <h2>📍 Định vị đơn vị</h2>
      <p>Khu vực đóng quân mẫu - Hà Nội</p>
    </div>

    <div class="card">
      <h2>☎ Liên hệ</h2>
      <p>Đ/c Trần Ngọc Nam</p>
      <p>Đ/c Hà Văn Tường</p>
      <p>Đ/c Nguyễn Đình Rĩnh</p>
    </div>

    <div class="card">
      <h2>💳 QR Chuyển khoản MB Bank</h2>
      <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=MBBANK-DEMO" alt="QR MB">
      <p>Quét mã để chuyển khoản</p>
    </div>

    <div class="card">
      <h2>⭐ Truyền thống</h2>
      <p>Đoàn kết - Kỷ luật - Chính quy - Hiện đại</p>
    </div>
  </div>
</body>
</html>
